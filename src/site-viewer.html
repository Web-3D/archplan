<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArchPlan — Site Viewer (production)</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #aac4d8;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      #app {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      /* DevHud perf (đọc renderer.info) — copy tối giản từ archplan-lab.css .ap-perf-* */
      .ap-perf-hud {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 30;
        display: flex;
        flex-direction: column;
        gap: 3px;
        padding: 8px 12px;
        border-radius: 10px;
        background: rgba(14, 18, 24, 0.82);
        color: #d7e2ec;
        font: 600 12px/1.35 ui-monospace, "SF Mono", Menlo, monospace;
        letter-spacing: 0.2px;
        pointer-events: none;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
      }
      .ap-perf-hud > div[data-state='ok'] {
        color: #7fe0a3;
      }
      .ap-perf-hud > div[data-state='warn'] {
        color: #ffd27a;
      }
      .ap-perf-hud > div[data-state='bad'] {
        color: #ff8e8e;
      }
      .ap-perf-leak {
        opacity: 0.85;
      }
      #vtag {
        position: absolute;
        right: 14px;
        bottom: 12px;
        color: #163;
        font-size: 12px;
        font-weight: 600;
        text-shadow: 0 1px 3px rgba(255, 255, 255, 0.6);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="vtag">site-viewer · production measure</div>
    <script type="module" src="./site-viewer.ts"></script>
  </body>
</html>
